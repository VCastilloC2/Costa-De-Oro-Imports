name: Dependency Check

on:
  push:
    branches: [ CI-CD ]
  pull_request:
    branches: [ main ]

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run OWASP Dependency-Check
        run: ./mvnw org.owasp:dependency-check-maven:check