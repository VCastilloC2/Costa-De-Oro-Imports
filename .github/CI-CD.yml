# .github/workflows/CI-CD.yml
name: Spring Boot CI/CD

on:
  push:
    branches: [ CI-CD ]         # Solo dispara cuando hay push a CI-CD
  pull_request:
    branches: [ main ]          # PR hacia main también dispara la verificación

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build & Test with Maven
        run: mvn clean verify

      - name: Submit Maven Dependency Snapshot
        uses: actions/maven-dependency-submission-action@latest
        continue-on-error: true   # Si falla, no detiene el workflow

  docker-deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image
        run: |
          IMAGE_TAG=myusername/myapp:${GITHUB_SHA::7}
          docker build -t $IMAGE_TAG .
          docker tag $IMAGE_TAG myusername/myapp:latest
          docker push $IMAGE_TAG
          docker push myusername/myapp:latest

  push-to-main:
    needs: docker-deploy        # Solo se ejecuta si docker-deploy pasa
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CI-CD branch
        uses: actions/checkout@v3
        with:
          ref: CI-CD
          persist-credentials: true  # Permite hacer push con el token del workflow

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge CI-CD into main
        run: |
          git fetch origin main
          git checkout main
          git merge CI-CD --no-ff -m "Merge changes from CI-CD after successful CI/CD"
          git push origin main