# ==========================================================
# 🍺 E-COMMERCE BEER - CONFIGURACIÓN DEL SERVIDOR
# ==========================================================
# Nombre de la aplicación (puede ser sobrescrito por variable de entorno)
spring.application.name=${NombreAplicacion:E-commerce_Beer}

# Puerto donde se ejecuta la app
server.port=${PuertoServidor:8080}

# Perfil activo (dev, test)
#spring.profiles.active=dev

# ==========================================================
# CONFIGURACIÓN DE ARCHIVOS (IMÁGENES)
# ==========================================================
# Propiedades para el tamanno de las imagenes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================================
# CONFIGURACIÓN REMEMBER ME
# ==========================================================
# REMEMBER ME CONFIGURATION
security.rememberme.key=${REMEMBER_ME_KEY}
security.rememberme.token-validity=${REMEMBER_ME_TOKEN}

# ==========================================================
# LOGGING PERSONALIZADO - COSTA DE ORO
# ==========================================================
# Este patrón define el formato de los logs en consola con un estilo elegante.
# Se utilizan colores inspirados en la temática "Costa de Oro":
# - Amarillo: Hora del sistema (formato HH:mm:ss.SSS)
# - Azul: Nivel del log (INFO, ERROR, DEBUG, etc.)
# - Magenta: Hilo de ejecución (thread)
# - Cyan: Nombre de la clase (logger)
# - Blanco: Mensaje del log
#
# Estructura del log:
# [Hora] | Nivel | Thread Clase → Mensaje
#
# Ejemplo visual:
# 14:32:10.123 | INFO  | main UserService → Usuario registrado correctamente
logging.pattern.console=%yellow(%d{HH:mm:ss.SSS}) %blue(| %-5level |) %magenta(%thread) %cyan(%logger{20}) %white(→ %msg)%n

# ==========================================================
# CONFIGURACIÓN JPA / HIBERNATE
# ==========================================================
# Estrategia de creación/actualización de tablas
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
# Mostrar consultas SQL en consola
spring.jpa.show-sql=true
# Formatear SQL (opcional)
#spring.jpa.properties.hibernate.format_sql=true

# ==========================================================
# INICIALIZACIÓN DE BASE DE DATOS
# ==========================================================
# Activar o desactivar carga automática de datos
#spring.sql.init.mode=always
spring.sql.init.mode=never

# Script de creación de estructura
spring.sql.init.schema-locations=classpath:sql/schema.sql

# Scripts de carga de datos (productos, usuarios, compras, etc.)
spring.sql.init.data-locations=classpath:sql/data.sql, classpath:sql/empresa.sql, classpath:sql/usuario.sql, classpath:sql/producto.sql, classpath:sql/blog.sql, classpath:sql/comentario.sql, classpath:sql/compra-2020.sql, classpath:sql/compra-2021.sql, classpath:sql/compra-2022.sql, classpath:sql/compra-2023.sql, classpath:sql/compra-2024.sql, classpath:sql/compra-2025.sql, classpath:sql/factura-proveedor.sql, classpath:sql/peticiones.sql

# ==========================================================
# CONFIGURACIÓN DE BASE DE DATOS
# ==========================================================
# URL de conexión a la base de datos
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ==========================================================
# CONFIGURACIÓN HIKARI (POOL DE CONEXIONES)
# ==========================================================
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

# ==========================================================
# CONFIGURACIÓN DE INTELIGENCIA ARTIFICIAL (OLLAMA)
# ==========================================================
spring.ai.model.chat=ollama
spring.ai.ollama.base-url=${OPENAI_BASE_URL}
spring.ai.ollama.chat.options.model=${OPENAI_MODEL:gemma3:latest}
spring.ai.ollama.chat.options.temperature=0.2
app.ai.negacion-respuesta = ${NEGATIVEANSWERS_APP_AI}

# ==========================================================
# MEMORIA DE CHAT (SPRING AI)
# ==========================================================
spring.ai.chat.memory.repository.jdbc.initialize-schema=always
spring.ai.chat.memory.repository.jdbc.schema=${JDBC_SCHEMA_CHAT_MEMORY}

# ==========================================================
# CONFIGURACIÓN JWT (AUTENTICACIÓN)
# ==========================================================
security.jwt.key.private=${JWT_SECRET_ECOMMERCE:LLAVE_TEMP_DEV}
security.jwt.user.generator=${JWT_ISSUER_ECOMMERCE:USER_TEMP_DEV}

# ==========================================================
# GOOGLE reCAPTCHA
# ==========================================================
spring.google.recaptcha.url=${PASSWORD_URL_RECAPTCHA:https://www.google.com/recaptcha/api/siteverify}
spring.google.recaptcha.secret-key=${PASSWORD_KEY_RECAPTCHA}

# ==========================================================
# OAUTH2 LOGIN CON GOOGLE
# ==========================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.provider.google.user-name-attribute=email

# ==========================================================
# CONFIGURACIÓN DE CORREO (SMTP - GMAIL)
# ==========================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.default-encoding=UTF-8
spring.mail.transport.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.debug=true

# ==========================================================
# CLOUDINARY (GESTIÓN DE IMÁGENES)
# ==========================================================
cloudinary.cloud-name=${CLOUD_NAME}
cloudinary.api_key=${CLOUD_API_KEY}
cloudinary.api_secret=${CLOUD_API_SECRET}

# ==========================================================
# MERCADO PAGO (PAGOS)
# ==========================================================
mercado_pago.access_token=${MERCADO_PAGO_ACCESS_TOKEN:ACCESS_TOKEN}

# ==========================================================
# MANEJO DE ERRORES PERSONALIZADOS
# ==========================================================
server.error.whitelabel.enabled=false
server.servlet.session.tracking-modes=cookie
spring.web.error.whitelabel.enabled=false
spring.web.error.path=/error
spring.web.error.include-message=always